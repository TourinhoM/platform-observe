apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: keycloak-rules
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: alerts
    # release=monitoring e o ruleSelector do kube-prometheus-stack.
    release: monitoring
spec:
  groups:
    - name: keycloak.health
      interval: 30s
      rules:
        # up{container="keycloak"}: gauge do scrape do ServiceMonitor.
        # 0 = endpoint /metrics inacessivel (pod down, crash, OOM).
        # absent() cobre o caso de ServiceMonitor nao ter target nenhum
        # (label drift, Service sem endpoints).
        - alert: KeycloakDown
          expr: |
            up{namespace="keycloak", container="keycloak"} == 0
            or absent(up{namespace="keycloak", container="keycloak"})
          for: 2m
          labels:
            severity: critical
            scope: auth
          annotations:
            summary: 'Keycloak inacessivel ha mais de 2min'
            description: |
              up == 0 (scrape falhou) OU metrica ausente (ServiceMonitor
              sem targets). Investigar:
                kubectl -n keycloak get pod -l app=keycloak
                kubectl -n keycloak describe keycloak keycloak
                kubectl -n keycloak logs -l app=keycloak --tail=100

        # 5xx ratio > 5% sustentado por 5min. Cobre regression de
        # deploy, DB indisponivel, OOM mid-request. Threshold baixo
        # porque Keycloak em estado saudavel raramente passa de 1%.
        # Guard com clamp_min pra evitar divisao por zero quando nao
        # ha trafego (lab fica idle horas) — sem isso, 0/0 = NaN
        # e o alert nem dispara, mas pra ser explicito.
        - alert: KeycloakHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace="keycloak", outcome="SERVER_ERROR"}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{namespace="keycloak"}[5m])), 0.001)
            > 0.05
          for: 5m
          labels:
            severity: warning
            scope: auth
          annotations:
            summary: 'Keycloak com mais de 5% de respostas 5xx'
            description: |
              {{ $value | humanizePercentage }} das requisicoes resultam
              em 5xx nos ultimos 5min. Causas comuns: Postgres degradado,
              JVM em GC pause longo, regression em realm config.
              Cross-check:
                kubectl -n keycloak logs -l app=keycloak --tail=200 | grep ERROR
                kubectl -n infra exec postgresql-0 -- pg_isready

        # p95 latencia nas chamadas autenticadas (token, userinfo, admin).
        # Quem aciona realmente: login endurecido por Postgres lento,
        # JVM em GC long pause, ou pressao em agroal pool.
        # 2s e generoso — autenticacao saudavel fica em <500ms.
        - alert: KeycloakHighLatencyAuth
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, uri) (
                rate(http_server_requests_seconds_bucket{
                  namespace="keycloak",
                  uri=~"/keycloak/realms/.*/protocol/.*|/keycloak/admin/.*"
                }[5m])
              )
            ) > 2
          for: 10m
          labels:
            severity: warning
            scope: auth
          annotations:
            summary: 'Keycloak p95 > 2s em endpoints de auth (uri={{ $labels.uri }})'
            description: |
              p95 de {{ $value | printf "%.2f" }}s no endpoint {{ $labels.uri }}
              ha mais de 10min. Investigar:
                - Postgres: latencia de query e pool utilization
                - JVM: ver dashboard "Keycloak — Troubleshooting" (GC pause, heap)
                - Network: ver se HAProxy/Ingress nao esta adicionando latencia

        # Heap commit usage > 85%. Heap commit cresce sob demanda ate o
        # max (Xmx) — usage / committed > 85% por 10min significa que JVM
        # esta perto do teto e GC vai degradar (alta frequencia de Full GC).
        # Threshold em committed (nao max) porque committed reflete pressao
        # real: se JVM ainda nao expandiu heap, ela tem folga.
        - alert: KeycloakJVMHeapPressure
          expr: |
            sum by (pod) (jvm_memory_used_bytes{namespace="keycloak", area="heap"})
            /
            sum by (pod) (jvm_memory_committed_bytes{namespace="keycloak", area="heap"})
            > 0.85
          for: 10m
          labels:
            severity: warning
            scope: auth
          annotations:
            summary: 'Keycloak {{ $labels.pod }} com heap > 85% committed'
            description: |
              JVM heap em {{ $value | humanizePercentage }} do committed
              ha mais de 10min — risco de Full GC frequente e degradacao.
              Investigar:
                kubectl -n keycloak top pod {{ $labels.pod }}
              Dashboard: "Keycloak — Troubleshooting" → JVM/Heap.
              Mitigacao: aumentar memory limit em base/keycloak.yaml ou
              tunar JAVA_OPTS_APPEND com -Xmx explicito.

        # Spike de LOGIN_ERROR — indicador de seguranca, nao de saude.
        # > 1 evento/s sustentado por 5min sugere:
        #   - brute force em conta existente
        #   - credential stuffing (lista vazada testada em massa)
        #   - regression em config de realm que rejeita todos logins
        # Threshold conservador pra lab; em prod escalar com baseline.
        - alert: KeycloakLoginFailureSpike
          expr: |
            sum(rate(keycloak_user_events_total{namespace="keycloak", event="LOGIN_ERROR"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
            scope: auth-security
          annotations:
            summary: 'Keycloak com taxa elevada de LOGIN_ERROR'
            description: |
              {{ $value | printf "%.2f" }} login errors/s ha mais de 5min.
              Verificar realm/cliente afetado:
                sum by (realm, client_id) (rate(keycloak_user_events_total{event="LOGIN_ERROR"}[5m]))
              Se for brute force, considerar habilitar brute force detection
              no realm (Authentication → Policies → Brute Force Detection).
