apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: lab-routing
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: routing
    # Casado pelo alertmanagerConfigSelector (release=monitoring).
    release: monitoring
spec:
  route:
    # Agrupa notificacoes por alert+severity+scope.
    groupBy: ['alertname', 'severity', 'scope']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    receiver: 'lab-log-only'

    # Routing por severity.
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: 'lab-log-only'

      - matchers:
          - name: severity
            value: warning
        receiver: 'lab-log-only'

      - matchers:
          - name: severity
            value: info
        receiver: 'lab-log-only'

  receivers:
    # Receiver log-only: webhook pra endpoint inexistente em loopback.
    - name: 'lab-log-only'
      webhookConfigs:
        - url: 'http://127.0.0.1:9999/lab-null-sink'
          sendResolved: false
