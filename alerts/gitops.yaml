apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitops-rules
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/component: alerts
    # release=monitoring e o ruleSelector do kube-prometheus-stack.
    release: monitoring
spec:
  groups:
    - name: gitops.argocd
      interval: 30s
      rules:
        # Alerta em Application Degraded (qualquer causa).
        - alert: ArgoCDAppDegraded
          expr: |
            argocd_app_info{health_status="Degraded"} == 1
          for: 5m
          labels:
            severity: warning
            scope: gitops
          annotations:
            summary: 'Argo CD app {{ $labels.name }} Degraded'
            description: |
              Application Argo CD {{ $labels.name }} (project: {{ $labels.project }},
              dest_namespace: {{ $labels.dest_namespace }}) esta Degraded ha mais
              de 5min. Causa comum: workload nao Healthy.
              Investigar:
                kubectl -n argocd get application {{ $labels.name }} -o yaml
                kubectl -n {{ $labels.dest_namespace }} get pods

        # Alerta em drift permanente (OutOfSync > 1h).
        - alert: ArgoCDAppOutOfSyncChronic
          expr: |
            argocd_app_info{sync_status!="Synced"} == 1
          for: 1h
          labels:
            severity: warning
            scope: gitops
          annotations:
            summary: 'Argo CD app {{ $labels.name }} OutOfSync ha mais de 1h'
            description: |
              Application Argo CD {{ $labels.name }} (project: {{ $labels.project }})
              esta OutOfSync ha mais de 1h — drift permanente.
              Investigar:
                kubectl -n argocd get application {{ $labels.name }} -o yaml
              Verificar quais recursos divergem em `.status.resources`.
