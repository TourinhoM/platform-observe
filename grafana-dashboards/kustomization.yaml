apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: grafana-dashboard-keycloak-troubleshooting
    files:
      - keycloak-troubleshooting.json
  - name: grafana-dashboard-keycloak-capacity-planning
    files:
      - keycloak-capacity-planning.json
  - name: grafana-dashboard-trivy-operator
    files:
      - trivy-operator.json
