apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-otel-agent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: monitoring

  # Agente de logs+traces+metrics (DaemonSet): le logs dos pods e empurra pro
  # Loki; recebe OTLP local das apps do mesmo no (hostPort) e repassa pro
  # otel-gateway — apps nunca falam com o gateway direto, so com o agent local.
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.159.2
    helm:
      values: |
        fullnameOverride: otel-agent
        mode: daemonset

        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib

        presets:
          logsCollection:
            enabled: true
            includeCollectorLogs: false
          kubernetesAttributes:
            enabled: true

        # otlp/otlp-http com hostPort: apps do mesmo no alcancam via $(HOST_IP),
        # sem cruzar rede nem fronteira de conta. Resto continua desligado.
        ports:
          otlp:
            enabled: true
          otlp-http:
            enabled: true
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
          metrics:
            enabled: true

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        config:
          processors:
            k8sattributes:
              extract:
                labels:
                  - tag_name: app
                    key: app.kubernetes.io/name
                    from: pod
            # Promove atributos k8s a atributos de recurso indexados pelo Loki.
            transform/loki_labels:
              error_mode: ignore
              log_statements:
                - context: resource
                  statements:
                    - set(attributes["namespace"], attributes["k8s.namespace.name"])
                    - set(attributes["pod"], attributes["k8s.pod.name"])
                    - set(attributes["container"], attributes["k8s.container.name"])
                    # Deriva os labels instance e job.
                    - set(attributes["instance"], Concat([Concat([attributes["namespace"], attributes["pod"]], "/"), attributes["container"]], ":"))
                    - set(attributes["job"], Concat([attributes["namespace"], attributes["app"]], "/")) where attributes["app"] != nil
                    # Deriva service.name (app, com fallback pro container).
                    - set(attributes["service.name"], attributes["app"]) where attributes["app"] != nil
                    - set(attributes["service.name"], attributes["container"]) where attributes["service.name"] == nil
          exporters:
            otlphttp/loki:
              logs_endpoint: http://monitoring-loki.monitoring.svc.cluster.local:3100/otlp/v1/logs
            # Unico egress do agent pra fora do no — sempre pro gateway, nunca
            # pro Tempo/Prometheus direto (isso continua so responsabilidade
            # do gateway, que e quem de fato cruza fronteira de conta no real).
            otlp/gateway:
              endpoint: otel-gateway.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
          service:
            pipelines:
              logs:
                receivers: [filelog]
                processors: [memory_limiter, k8sattributes, transform/loki_labels, batch]
                exporters: [otlphttp/loki]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, k8sattributes, batch]
                exporters: [otlp/gateway]
              traces:
                receivers: [otlp]
                processors: [memory_limiter, k8sattributes, batch]
                exporters: [otlp/gateway]

        serviceMonitor:
          enabled: true
          extraLabels:
            release: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
