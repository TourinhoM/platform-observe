apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-otel-agent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: monitoring

  # Agente de logs (DaemonSet). Le os logs dos pods em /var/log/pods (filelog),
  # enriquece com metadados de pod (k8sattributes) e promove namespace/pod/
  # container/app a atributos de recurso para o Loki indexar como labels — os
  # MESMOS labels que o Alloy usava, sem quebrar queries/dashboards. Substitui a
  # pipeline de logs (loki.source.kubernetes) que rodava no Alloy.
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.159.2
    helm:
      values: |
        fullnameOverride: otel-agent
        mode: daemonset

        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib

        presets:
          logsCollection:
            enabled: true
            includeCollectorLogs: false
          kubernetesAttributes:
            enabled: true

        # Agente so le arquivos e empurra pro Loki — nenhuma porta de ingestao exposta.
        ports:
          otlp:
            enabled: false
          otlp-http:
            enabled: false
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
          metrics:
            enabled: true

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        config:
          processors:
            k8sattributes:
              extract:
                labels:
                  - tag_name: app
                    key: app.kubernetes.io/name
                    from: pod
            # Promove os atributos k8s a atributos de recurso com os MESMOS nomes de
            # label que o Alloy indexava (namespace/pod/container/app). O Loki indexa
            # esses quatro como stream labels (ver limits_config.otlp_config no Loki).
            transform/loki_labels:
              error_mode: ignore
              log_statements:
                - context: resource
                  statements:
                    - set(attributes["namespace"], attributes["k8s.namespace.name"])
                    - set(attributes["pod"], attributes["k8s.pod.name"])
                    - set(attributes["container"], attributes["k8s.container.name"])
                    # Reproduz os labels convencionais do Loki que o Alloy setava
                    # (loki.source.kubernetes), pra queries antigas no Explore seguirem:
                    #   instance = <namespace>/<pod>:<container>
                    #   job      = <namespace>/<app>
                    - set(attributes["instance"], Concat([Concat([attributes["namespace"], attributes["pod"]], "/"), attributes["container"]], ":"))
                    - set(attributes["job"], Concat([attributes["namespace"], attributes["app"]], "/")) where attributes["app"] != nil
                    # service.name -> o Loki promove a label service_name, ancora do
                    # Logs Drilldown do Grafana. Deriva do app.kubernetes.io/name, com
                    # fallback pro nome do container. Sem isso o Drilldown nasce vazio.
                    - set(attributes["service.name"], attributes["app"]) where attributes["app"] != nil
                    - set(attributes["service.name"], attributes["container"]) where attributes["service.name"] == nil
          exporters:
            otlphttp/loki:
              logs_endpoint: http://monitoring-loki.monitoring.svc.cluster.local:3100/otlp/v1/logs
          service:
            pipelines:
              logs:
                receivers: [filelog]
                processors: [memory_limiter, k8sattributes, transform/loki_labels, batch]
                exporters: [otlphttp/loki]
              metrics: null
              traces: null

        serviceMonitor:
          enabled: true
          extraLabels:
            release: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
