apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: monitoring

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.24.4
    helm:
      values: |
        tempo:
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
          retention: 24h
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          metricsGenerator:
            enabled: true
            remoteWriteUrl: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
                  - local-blocks
                max_active_series: 100000

        persistence:
          enabled: true
          size: 5Gi

        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
