apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-tls
  namespace: argocd
spec:
  project: monitoring

  source:
    repoURL: https://github.com/TourinhoM/platform-observe.git
    targetRevision: main
    path: tls

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
