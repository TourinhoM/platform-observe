apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: monitoring

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 84.3.0
    helm:
      values: |
        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 1
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi
        grafana:
          enabled: true

          # Plugins de Drilldown (Logs/Metrics/Traces).
          plugins:
            - grafana-lokiexplore-app       # Logs Drilldown
            - grafana-metricsdrilldown-app  # Metrics Drilldown
            - grafana-exploretraces-app     # Traces Drilldown

          # Desliga init-chown-data; volume ajustado via fsGroup.
          initChownData:
            enabled: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472

          extraConfigmapMounts:
            - name: lab-ca-bundle
              mountPath: /etc/ssl/certs/lab-ca.crt
              subPath: ca.crt
              configMap: lab-ca-bundle
              readOnly: true
          env:
            SSL_CERT_FILE: /etc/ssl/certs/lab-ca.crt

          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password

          envFromSecrets:
            - name: grafana-db-credentials
            - name: grafana-oidc-credentials

          grafana.ini:
            server:
              root_url: https://grafana.local/
            security:
              allow_embedding: true
            auth.anonymous:
              enabled: true
              org_name: Main Org.
              org_role: Viewer
            auth.generic_oauth:
              enabled: true
              name: Keycloak
              client_id: grafana
              client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes: openid profile email groups
              auth_url: https://keycloak.local/keycloak/realms/kubernetes/protocol/openid-connect/auth
              token_url: https://keycloak.local/keycloak/realms/kubernetes/protocol/openid-connect/token
              api_url: https://keycloak.local/keycloak/realms/kubernetes/protocol/openid-connect/userinfo
              role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || contains(groups[*], 'grafana-viewers') && 'Viewer' || 'Viewer'"
              role_attribute_strict: false
              allow_sign_up: true
            database:
              type: postgres
              host: postgresql.infra.svc.cluster.local:5432
              name: grafana
              user: grafana
              password: $__env{GF_DATABASE_PASSWORD}
            tracing.opentelemetry.otlp:
              address: otel-gateway.monitoring.svc.cluster.local:4317
              propagation: w3c

          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 5
                    PLUGIN=/var/lib/grafana/plugins/grafana-exploretraces-app
                    # Pula o patch se o plugin nao instalou.
                    [ -d "$PLUGIN" ] || { echo "exploretraces ausente, pulando patch de SRI"; exit 0; }
                    sed -i "s/R=\"\${primarySignal} && \${filters}\"/R=\"\${primarySignal}\"/g" $PLUGIN/module.js
                    sed -i 's/}(JSON.parse(t));e.children.sort(/}((JSON.parse(t).traces||JSON.parse(t)));e.children.sort(/g' $PLUGIN/966.js
                    NEW_HASH="sha256-$(sha256sum $PLUGIN/966.js | cut -d' ' -f1 | xxd -r -p | base64 -w 0)"
                    OLD_HASH=$(grep -o '966:"sha256-[^"]*"' $PLUGIN/module.js | grep -o 'sha256-[^"]*')
                    sed -i "s|966:\"${OLD_HASH}\"|966:\"${NEW_HASH}\"|g" $PLUGIN/module.js

          persistence:
            enabled: true
            type: pvc
            accessModes: ["ReadWriteOnce"]
            size: 2Gi

          ingress:
            enabled: true
            ingressClassName: traefik

            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

            hosts:
              - grafana.local

            tls:
              - hosts:
                  - grafana.local
                secretName: monitoring-tls
        prometheus:
          service:
            type: ClusterIP
            port: 9090
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            hosts:
              - prometheus.local
            tls:
              - secretName: monitoring-tls
                hosts:
                  - prometheus.local
          prometheusSpec:
            enableRemoteWriteReceiver: true
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        prometheus-node-exporter:
          enabled: true
          hostRootFsMount:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true