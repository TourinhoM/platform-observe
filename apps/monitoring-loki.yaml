apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: monitoring

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 168h
            # Ingestao OTLP (agente OTel -> /otlp/v1/logs). ignore_defaults desliga a
            # promocao padrao do Loki; indexamos como stream labels so o conjunto abaixo
            # (os que o Alloy usava + service.name). O resto vira structured metadata.
            # service.name e indexado como label `service_name` (o . vira _), ancora do
            # Logs Drilldown do Grafana.
            otlp_config:
              resource_attributes:
                ignore_defaults: true
                attributes_config:
                  - action: index_label
                    attributes:
                      - namespace
                      - pod
                      - container
                      - app
                      - job
                      - instance
                      - service.name

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          persistence:
            enabled: true
            size: 5Gi

        # Desabilita componentes do modo distribuído
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        gateway:
          enabled: false

        monitoring:
          serviceMonitor:
            enabled: true
            labels:
              release: monitoring
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        test:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
