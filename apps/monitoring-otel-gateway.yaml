apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-otel-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: monitoring

  # Gateway de traces (Deployment): recebe OTLP das apps e exporta pro Tempo.
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.159.2
    helm:
      values: |
        fullnameOverride: otel-gateway
        mode: deployment
        # 1 replica no lab.
        replicaCount: 1

        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib

        presets:
          kubernetesAttributes:
            enabled: true

        # Portas de ingestao expostas via Service; jaeger/zipkin off.
        ports:
          otlp:
            enabled: true
            hostPort: null
          otlp-http:
            enabled: true
            hostPort: null
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
          metrics:
            enabled: true

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          initialDelaySeconds: 15
          failureThreshold: 6
        readinessProbe:
          initialDelaySeconds: 15
          failureThreshold: 6

        # Teste do exporter datadog (trial) — DD_API_KEY vem do vault-homelab via
        # ExternalSecret (secrets/externalsecret-datadog.yaml), mesmo padrao do
        # resto do repo.
        extraEnvs:
          - name: DD_API_KEY
            valueFrom:
              secretKeyRef:
                name: datadog-api-key
                key: api-key

        config:
          processors:
            k8sattributes:
              extract:
                labels:
                  - tag_name: app
                    key: app.kubernetes.io/name
                    from: pod
            # deployment.environment a partir do sufixo do namespace (-dev/-hml/-prd)
            # — é o que o exporter datadog usa pra tag "env" (k8s.namespace.name
            # sozinho não vira env lá). Sem declarar nada em app/chart nenhum.
            transform/env:
              error_mode: ignore
              trace_statements:
                - context: resource
                  statements:
                    - set(attributes["deployment.environment"], "dev") where IsMatch(attributes["k8s.namespace.name"], "-dev$")
                    - set(attributes["deployment.environment"], "hml") where IsMatch(attributes["k8s.namespace.name"], "-hml$")
                    - set(attributes["deployment.environment"], "prd") where IsMatch(attributes["k8s.namespace.name"], "-prd$")
              metric_statements:
                - context: resource
                  statements:
                    - set(attributes["deployment.environment"], "dev") where IsMatch(attributes["k8s.namespace.name"], "-dev$")
                    - set(attributes["deployment.environment"], "hml") where IsMatch(attributes["k8s.namespace.name"], "-hml$")
                    - set(attributes["deployment.environment"], "prd") where IsMatch(attributes["k8s.namespace.name"], "-prd$")
            # Deriva peer.service e kind pro Service Graph.
            transform/peer:
              error_mode: ignore
              trace_statements:
                - context: span
                  statements:
                    - set(attributes["peer.service"], Split(attributes["server.address"], ".")[0]) where IsMatch(attributes["server.address"], "^[a-zA-Z][a-zA-Z0-9-]+([.][a-zA-Z0-9-]+)+$")
                    - set(attributes["peer.service"], attributes["server.address"]) where IsMatch(attributes["server.address"], "^[a-zA-Z][a-zA-Z0-9-]+$")
                    - set(attributes["peer.service"], "argocd-repo-server") where IsMatch(attributes["server.address"], "^[0-9]") and IsMatch(attributes["rpc.method"], "^repository[.]")
                    - set(attributes["kind"], "client") where kind == 3
                    - set(attributes["kind"], "server") where kind == 2
            # Só pro ramo Datadog: derruba dev/hml. prd e qualquer coisa sem
            # deployment.environment reconhecido passam (fail-open).
            filter/prod_only:
              error_mode: ignore
              traces:
                span:
                  - resource.attributes["deployment.environment"] == "dev"
                  - resource.attributes["deployment.environment"] == "hml"
              metrics:
                metric:
                  - resource.attributes["deployment.environment"] == "dev"
                  - resource.attributes["deployment.environment"] == "hml"
          exporters:
            otlp/tempo:
              endpoint: monitoring-tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            prometheusremotewrite:
              endpoint: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
              # Sem isso, só service.name/service.namespace viram job/instance;
              # k8s.namespace.name/k8s.pod.name (do k8sattributes) são descartados.
              resource_to_telemetry_conversion:
                enabled: true

            datadog:
              hostname: otel-gateway-lab
              host_metadata:
                enabled: false
              api:
                key: ${env:DD_API_KEY}
                site: datadoghq.com
          connectors:
            # Computa APM stats (latência/erro/hit count por serviço) a partir
            # dos traces — sem isso as telas de Service Catalog/APM Analytics
            # no Datadog não populam, mesmo com os traces chegando via exporter.
            datadog/connector: {}
          service:
            pipelines:
              # Tempo/Prometheus recebem tudo, sem filtro de ambiente.
              traces:
                receivers: [otlp]
                processors: [memory_limiter, k8sattributes, transform/env, transform/peer, batch]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, k8sattributes, transform/env, batch]
                exporters: [prometheusremotewrite]
              # Ramo só-Datadog: mesmo receiver, com filter/prod_only antes do
              # exporter — dev/hml nunca saem daqui.
              traces/datadog:
                receivers: [otlp]
                processors: [memory_limiter, k8sattributes, transform/env, filter/prod_only, batch]
                exporters: [datadog, datadog/connector]
              metrics/datadog:
                receivers: [otlp, datadog/connector]
                processors: [memory_limiter, k8sattributes, transform/env, filter/prod_only, batch]
                exporters: [datadog]
              logs: null

        serviceMonitor:
          enabled: true
          extraLabels:
            release: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
